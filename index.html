document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:#EFEAE0; display:flex; justify-content:center; font-family:'Manrope',system-ui,sans-serif; color:#221D17;\">\n  <div style=\"width:100%; max-width:440px; padding:36px 26px 40px;\">\n\n    <!-- Header -->\n    <div style=\"display:flex; flex-direction:column; gap:10px; margin-bottom:30px;\">\n      <div style=\"display:flex; align-items:center; gap:8px; font-size:11px; font-weight:600; letter-spacing:2.4px; text-transform:uppercase; color:#8C8475;\">\n        <span style=\"display:inline-block; width:14px; height:1px; background:{{ accent }};\"><\u002Fspan>\n        <span>{{ placeName }}<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin:0; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:42px; line-height:1; letter-spacing:-0.5px;\">The Front Door<\u002Fh1>\n      <p style=\"margin:4px 0 0; font-size:14px; color:#8C8475;\">Two quick routines. The key always turns clockwise.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ENTER -->\n    <div style=\"background:#FBF8F2; border:1px solid #E7DECF; border-radius:20px; padding:22px 22px 8px; margin-bottom:18px; box-shadow:0 16px 36px -30px rgba(34,29,23,0.5);\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;\">\n        <h2 style=\"margin:0; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:26px; line-height:1.1;\">How to enter<\u002Fh2>\n        <span style=\"font-size:10.5px; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:{{ accent }};\">Arriving<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">1<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Turn the key a full turn — 360° clockwise.<\u002Fdiv>\n        <div style=\"flex:none;\"><dc-import name=\"DoorIcon\" kind=\"key\" accent=\"{{ accent }}\" hint-size=\"88px,88px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">2<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Push the handle all the way down.<\u002Fdiv>\n        <div style=\"flex:none;\"><dc-import name=\"DoorIcon\" kind=\"handleDown\" accent=\"{{ accent }}\" hint-size=\"88px,88px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">3<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Turn the key again to open.<\u002Fdiv>\n        <div style=\"flex:none;\"><dc-import name=\"DoorIcon\" kind=\"keySlight\" accent=\"{{ accent }}\" hint-size=\"88px,88px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:14px 14px; margin:6px 0 14px; border-radius:13px; background:{{ accentSoft }};\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">4<\u002Fdiv>\n        <div style=\"flex:1; font-size:15px; font-weight:600; line-height:1.35; color:#5A5142;\">Once inside, please remember to lock the door.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LOCK -->\n    <div style=\"background:#FBF8F2; border:1px solid #E7DECF; border-radius:20px; padding:22px 22px 8px; box-shadow:0 16px 36px -30px rgba(34,29,23,0.5);\">\n      <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;\">\n        <h2 style=\"margin:0; font-family:'Cormorant Garamond',serif; font-weight:600; font-size:26px; line-height:1.1;\">How to lock<\u002Fh2>\n        <span style=\"font-size:10.5px; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:{{ accent }};\">Indoors<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">1<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Close the door.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">2<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Lift the handle up 100%.<\u002Fdiv>\n        <div style=\"flex:none;\"><dc-import name=\"DoorIcon\" kind=\"handleUp\" accent=\"{{ accent }}\" hint-size=\"88px,88px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:13px 0; border-top:1px solid #EDE5D7;\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">3<\u002Fdiv>\n        <div style=\"flex:1; font-size:16.5px; font-weight:500; line-height:1.4;\">Turn the key a full turn — 360° clockwise.<\u002Fdiv>\n        <div style=\"flex:none;\"><dc-import name=\"DoorIcon\" kind=\"key\" accent=\"{{ accent }}\" hint-size=\"88px,88px\"><\u002Fdc-import><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; gap:14px; align-items:center; padding:14px 14px; margin:6px 0 14px; border-radius:13px; background:{{ accentSoft }};\">\n        <div style=\"font-family:'Cormorant Garamond',serif; font-size:30px; line-height:1; color:{{ accent }}; width:24px; flex:none; text-align:center;\">4<\u002Fdiv>\n        <div style=\"flex:1;\">\n          <div style=\"font-size:16px; font-weight:700; line-height:1.3; color:#3F392E;\">Check the handle<\u002Fdiv>\n          <div style=\"margin-top:2px; font-size:14.5px; font-weight:500; line-height:1.3; color:#8A8170;\">Is the door locked?<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 412, &quot;height&quot;: 980 },\n  &quot;placeName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Guest entry&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;tone&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Brass&quot;, &quot;Sage&quot;, &quot;Clay&quot;, &quot;Slate&quot;], &quot;default&quot;: &quot;Brass&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const map = {\n      Brass: ['#9A7B4F', '#F0E8D9'],\n      Sage:  ['#6E7E63', '#E6EAE1'],\n      Clay:  ['#A4715A', '#F1E5DD'],\n      Slate: ['#5C6672', '#E4E7EB'],\n    };\n    const [accent, accentSoft] = map[this.props.tone] || map.Brass;\n    return {\n      placeName: this.props.placeName || 'Guest entry',\n      accent,\n      accentSoft,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
